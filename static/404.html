<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面不存在 | Oaklian</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 48px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #F8FAFC;
    }

    .error-code {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      color: #1E3A5F;
      letter-spacing: -4px;
      margin-bottom: 24px;
      user-select: none;
    }

    .error-title {
      font-size: 22px;
      font-weight: 600;
      color: #E2E8F0;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 15px;
      color: #94A3B8;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #2563EB;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn:hover { background: #1D4ED8; }

    .divider {
      width: 40px;
      height: 2px;
      background: #1E3A5F;
      margin: 0 auto 32px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <img class="brand-icon" src="/assets/images/logo-oaklian-light.png" alt="Oaklian" onerror="this.style.display='none'" />
      <span class="brand-name">OAKLIAN</span>
    </div>

    <div class="error-code">404</div>
    <div class="divider"></div>

    <h1 class="error-title">页面不存在</h1>
    <p class="error-desc">您访问的页面不存在或已被移动。<br />请返回首页重新开始。</p>

    <a class="btn" href="/">返回首页</a>
  </div>
</body>
</html>
