<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OAKLIAN CRM</title>
  <meta name="theme-color" content="#0F172A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OAKLIAN CRM" />
  <link rel="manifest" href="/manifest.json" />
  <link id="app-favicon" rel="icon" href="/assets/images/favicon.png" />
  <link rel="stylesheet" href="/assets/css/styles.css?v=20260616-fullfix" />
  <link rel="stylesheet" href="/assets/css/estimates_v2.css?v=20260616-mobile" />
</head>
<body>
  <div id="login-view" class="login-wrap"></div>

  <div id="app-view" class="layout hidden">
    <aside class="sidebar">
      <div class="brand-lockup">
        <img id="brand-icon" class="brand-icon" src="/assets/images/logo-oaklian-light.png" alt="Oaklian Remodeling Logo" />
        <div class="brand-wordmark">
          <h1 id="brand-name">OAKLIAN</h1>
          <div id="brand-subtitle">REMODELING</div>
        </div>
      </div>
      <div id="brand-tagline" class="brand-tagline">REMODELING &amp; CONSTRUCTION</div>
      <nav id="menu" class="menu"></nav>
    </aside>

    <div class="content">
      <header class="topbar">
        <div>
          <h2 id="page-title"></h2>
          <p id="page-desc"></p>
        </div>
        <div class="top-actions">
          <select id="lang-select">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>
          <div class="notif-wrap">
            <button id="notification-btn" class="secondary notif-btn" type="button">
              <span id="notification-btn-label">通知</span>
              <span id="notification-unread-badge" class="notif-badge hidden">0</span>
            </button>
            <div id="notification-popover" class="notif-popover hidden"></div>
          </div>
          <div id="user-meta" class="user-meta"></div>
          <button id="logout-btn" class="secondary"></button>
        </div>
      </header>
      <main id="main"></main>
    </div>
  </div>
  <div id="project-detail-drawer" class="drawer hidden"></div>
  <div id="vendor-ledger-drawer" class="drawer hidden"></div>
  <div id="project-cost-ledger-drawer" class="drawer hidden"></div>
  <div id="mobile-tabbar" class="mobile-tabbar hidden"></div>
  <div id="mobile-more-overlay" class="mobile-more-overlay hidden"></div>
  <div id="mobile-more-sheet" class="mobile-more-sheet hidden"></div>
  <script src="/assets/js/app.js?v=20260616-compact2"></script>
  <script src="/assets/js/estimates_v2.js?v=20260611-payment-total"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>
</body>
</html>
